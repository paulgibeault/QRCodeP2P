<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P QR Code Signaling</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>QR-Code P2P Connect <span style="font-size:0.5em; color:#888; vertical-align:middle; font-weight:normal; margin-left:10px;">v1.4.0</span></h1>
        <p>Establish a WebRTC connection with no signaling server!</p>
        <div id="connection-status" class="status-disconnected">Disconnected</div>
    </header>

    <main>
        <div class="panels">
            <div class="panel actions">
                <h2>Connection Setup</h2>
                <p>Determine who will host and who will join.</p>
                <div class="button-group">
                    <button id="btn-multiplayer" class="btn primary">Open Connection Menu</button>
                </div>

                <h3 style="font-size:14px; margin-top:30px; border-bottom:1px solid #404040; padding-bottom:5px;">
                    Active ICE Servers <span style="font-size:10px; color:#a1a1aa; float:right;">STUN/TURN</span>
                </h3>
                <div class="ice-servers-list">
                    <ul id="ice-servers-display">
                        <li>stun:stun.l.google.com:19302</li>
                    </ul>
                </div>
            </div>

            <div class="panel chat-section">
                <h2>Test Bed Console</h2>
                <div id="messages" class="messages-box" role="log" aria-live="polite"></div>
                <form id="chat-form" class="input-group">
                    <input type="text" id="chat-input" placeholder="Type a message..." disabled>
                    <button type="submit" id="btn-send" class="btn" disabled>Send</button>
                </form>
            </div>

            <div class="panel diagnostics-section">
                <h2>Network Diagnostics</h2>
                <div id="diagnostics-out" class="diagnostics-box" role="log" aria-live="polite">
                    <div class="diag-info">[SYSTEM] Engine initialized.</div>
                </div>
                <button id="btn-clear-diag" class="btn text-btn" style="background:#111; font-size:12px; margin-top:5px;">Clear Logs</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import P2PAddon from './p2p-addon.js';

    const mp = new P2PAddon();
    await mp.init();

    // Open connection menu
    document.getElementById('btn-multiplayer').addEventListener('click', () => mp.showUI());

    // --- Status ---
    const statusBadge = document.getElementById('connection-status');
    mp.addEventListener('status', (e) => {
        const { status } = e.detail;
        statusBadge.textContent = status.toUpperCase();
        statusBadge.className = '';
        if (status === 'connected') {
            statusBadge.classList.add('status-connected');
            document.getElementById('btn-multiplayer').textContent = '✅ Connected';
            logMessage('Connected to peer!', 'system');
            document.getElementById('chat-input').disabled = false;
            document.getElementById('btn-send').disabled = false;
        } else if (status === 'disconnected') {
            statusBadge.classList.add('status-disconnected');
            document.getElementById('chat-input').disabled = true;
            document.getElementById('btn-send').disabled = true;
        } else {
            statusBadge.classList.add('status-connecting');
        }
    });

    // --- Chat ---
    function logMessage(text, type = 'system') {
        const div = document.createElement('div');
        const colors = { system: '#888', me: '#4ade80', peer: '#60a5fa' };
        div.style.color = colors[type] || '#888';
        div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    mp.addEventListener('message', (e) => {
        logMessage(e.detail.incoming ? `Peer: ${e.detail.text}` : `Me: ${e.detail.text}`,
                   e.detail.incoming ? 'peer' : 'me');
    });

    document.getElementById('chat-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        if (input.value.trim()) {
            mp.send(input.value.trim());
            input.value = '';
        }
    });

    // --- Diagnostics passthrough ---
    mp.addEventListener('diagnostic', (e) => {
        const { type, msg } = e.detail;
        const div = document.createElement('div');
        div.className = `diag-${type}`;
        div.textContent = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
        const out = document.getElementById('diagnostics-out');
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    });

    document.getElementById('btn-clear-diag').addEventListener('click', () => {
        const out = document.getElementById('diagnostics-out');
        out.innerHTML = '<div class="diag-info">[SYSTEM] Diagnostics cleared.</div>';
    });
</script>
</body>
</html>
