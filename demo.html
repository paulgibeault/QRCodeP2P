<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P2P Addon Demo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: #fff; max-width: 600px; margin: 0 auto; }
        #chat { width: 100%; height: 300px; background: #111; margin-bottom: 10px; padding: 10px; overflow-y: auto; border: 1px solid #444; border-radius: 8px;}
        .input-row { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #111; color: #fff;}
        button { padding: 10px 15px; cursor: pointer; background: #4ade80; color: #000; border: none; border-radius: 4px; font-weight: bold;}
        button:hover { background: #22c55e; }
        #btn-multiplayer { background: #60a5fa; margin-bottom: 20px; width: 100%; }
        #btn-multiplayer:hover { background: #3b82f6; }
    </style>
</head>
<body>
    <h1>My Awesome Game</h1>
    <p>This page demonstrates how easily the <code>p2p-addon</code> can be integrated into any existing game.</p>
    
    <button id="btn-multiplayer">Open Multiplayer Menu</button>
    
    <div>
        <div id="chat"></div>
        <div class="input-row">
            <input type="text" id="msg-input" placeholder="Type a message to send to your peer...">
            <button id="btn-send">Send</button>
        </div>
    </div>

    <!-- Integrate the Addon -->
    <script type="module">
        import P2PAddon from './p2p-addon.js';
        
        const mp = new P2PAddon();
        
        // Initialize the addon (loads dependencies and CSS)
        mp.init().then(() => {
            console.log("P2P Addon initialized!");
        });

        document.getElementById('btn-multiplayer').addEventListener('click', () => {
            mp.showUI();
        });

        const chat = document.getElementById('chat');
        
        // Listen for raw messages to build the chat log
        mp.addEventListener('message', (e) => {
            const div = document.createElement('div');
            div.style.marginBottom = '5px';
            div.textContent = (e.detail.incoming ? "Peer: " : "Me: ") + e.detail.text;
            div.style.color = e.detail.incoming ? "#60a5fa" : "#4ade80";
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        // Listen for connection status changes
        mp.addEventListener('status', (e) => {
            const div = document.createElement('div');
            div.style.marginBottom = '5px';
            div.style.color = '#a1a1aa';
            div.textContent = `[System] Connection status: ${e.detail}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            
            if (e.detail === 'connected') {
                document.getElementById('btn-multiplayer').textContent = 'Multiplayer Active';
                document.getElementById('btn-multiplayer').style.background = '#dcfce7';
                document.getElementById('btn-multiplayer').style.color = '#166534';
            }
        });

        document.getElementById('btn-send').addEventListener('click', () => {
            const input = document.getElementById('msg-input');
            if(input.value) {
                mp.send(input.value);
                input.value = '';
            }
        });

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('btn-send').click();
            }
        });
    </script>
</body>
</html>
